version: 2
updates:
  # GitHub Actions (workflows + reusable composite actions)
  - package-ecosystem: "github-actions"
    directories:
      - "/"
      - "/actions/*"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    reviewers:
      - "plevie"
    labels:
      - "dependencies"
      - "github-actions"
