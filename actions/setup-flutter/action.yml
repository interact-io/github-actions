name: "Setup Flutter"
description: "Install Flutter SDK, checkout code, install SSH keys, and install pub dependencies"

inputs:
  flutter-version:
    description: "Flutter SDK version"
    required: false
    default: "3.35.0"
  flutter-channel:
    description: "Flutter release channel"
    required: false
    default: "stable"
  ssh-private-key:
    description: "SSH private key(s) for private package access"
    required: true
  enable-pub-cache:
    description: "Cache ~/.pub-cache and .dart_tool"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Install SSH keys
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ inputs.ssh-private-key }}

    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ inputs.flutter-version }}
        channel: ${{ inputs.flutter-channel }}
        cache: true

    - name: Cache pub dependencies
      if: ${{ inputs.enable-pub-cache == 'true' }}
      uses: actions/cache@v4
      with:
        path: |
          ~/.pub-cache
          .dart_tool
        key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
        restore-keys: |
          ${{ runner.os }}-pub-

    - name: Install packages
      shell: bash
      run: flutter pub get
